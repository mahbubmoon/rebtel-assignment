syntax = "proto3";

option csharp_namespace = "Library.Grpc";

package library;

service LibraryAnalytics {
  rpc GetMostBorrowedBooks (MostBorrowedBooksRequest) returns (MostBorrowedBooksResponse);
  rpc GetTopBorrowers (TopBorrowersRequest) returns (TopBorrowersResponse);
  rpc EstimateReadingPace (ReadingPaceRequest) returns (ReadingPaceResponse);
  rpc GetAlsoBorrowedBooks (AlsoBorrowedBooksRequest) returns (AlsoBorrowedBooksResponse);
}

message MostBorrowedBooksRequest {
  int32 limit = 1;
}

message MostBorrowedBooksResponse {
  repeated BorrowedBookStatistic books = 1;
}

message BorrowedBookStatistic {
  int64 book_id = 1;
  string title = 2;
  string author = 3;
  int32 borrow_count = 4;
}

message TopBorrowersRequest {
  string from = 1;
  string to = 2;
  int32 limit = 3;
}

message TopBorrowersResponse {
  repeated BorrowerActivity borrowers = 1;
}

message BorrowerActivity {
  int64 borrower_id = 1;
  string name = 2;
  int32 borrow_count = 3;
}

message ReadingPaceRequest {
  int64 borrower_id = 1;
  int64 book_id = 2;
}

message ReadingPaceResponse {
  bool found = 1;
  int64 borrower_id = 2;
  int64 book_id = 3;
  string book_title = 4;
  int32 page_count = 5;
  string borrowed_on = 6;
  string returned_on = 7;
  int32 reading_days = 8;
  double pages_per_day = 9;
  string message = 10;
}

message AlsoBorrowedBooksRequest {
  int64 book_id = 1;
  int32 limit = 2;
}

message AlsoBorrowedBooksResponse {
  repeated AlsoBorrowedBook books = 1;
}

message AlsoBorrowedBook {
  int64 book_id = 1;
  string title = 2;
  string author = 3;
  int32 co_borrower_count = 4;
  int32 borrow_count = 5;
}
